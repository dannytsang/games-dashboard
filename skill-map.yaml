    - TBD

privacy_policy:
  never_commit_to_public_repo:
    - private SDD/spec files
    - raw game-library exports or scraping outputs
    - OAuth tokens, client secrets, API keys
    - personal gaming identifiers (Steam IDs, PSN IDs, etc.)
    - local Hermes runtime paths containing private state
    - Vercel Blob store IDs or tokens
    - screenshot payloads containing private content
  public_repo_allowed:
    - Next.js source code
    - server-side data access abstractions
    - sanitised tests and fictional fixtures
    - env var names without values
    - high-level public architecture notes if needed